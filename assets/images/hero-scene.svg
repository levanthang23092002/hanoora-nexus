<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="light" x1="360" y1="80" x2="360" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity=".4"/>
    </filter>
  </defs>

  <circle cx="360" cy="300" r="120" fill="#F59E0B" opacity=".12" filter="url(#blur)"/>
  <circle cx="520" cy="140" r="80" fill="#6366F1" opacity=".18" filter="url(#blur)"/>

  <!-- Data in -->
  <g filter="url(#shadow)">
    <rect x="56" y="220" width="160" height="200" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="76" y="248" width="120" height="12" rx="6" fill="#475569"/>
    <rect x="76" y="272" width="88" height="12" rx="6" fill="#334155"/>
    <rect x="76" y="308" width="120" height="80" rx="12" fill="#0F172A" stroke="#1E293B"/>
    <path d="M92 340h88M92 360h64M92 380h72" stroke="#64748B" stroke-width="6" stroke-linecap="round"/>
    <text x="96" y="210" fill="#94A3B8" font-family="Inter,sans-serif" font-size="13" font-weight="600">DATA IN</text>
  </g>

  <!-- Nexus core -->
  <g filter="url(#shadow)">
    <circle cx="360" cy="320" r="72" fill="#0F172A" stroke="url(#light)" stroke-width="3"/>
    <circle cx="360" cy="320" r="48" fill="url(#g1)" opacity=".9"/>
    <circle cx="360" cy="320" r="20" fill="#FEF3C7"/>
    <path d="M300 320h24M396 320h24M360 264v24M360 356v24" stroke="url(#light)" stroke-width="3" stroke-linecap="round" opacity=".8"/>
    <path d="M318 302l12 12M390 374l12 12M402 302l-12 12M330 374l-12 12" stroke="url(#light)" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
    <text x="318" y="418" fill="#FBBF24" font-family="Inter,sans-serif" font-size="14" font-weight="700" letter-spacing="2">NEXUS</text>
  </g>

  <!-- AI logic -->
  <g filter="url(#shadow)">
    <rect x="248" y="108" width="224" height="88" rx="18" fill="#111827" stroke="url(#g1)" stroke-width="2"/>
    <text x="272" y="142" fill="#22D3EE" font-family="Inter,sans-serif" font-size="13" font-weight="700">AI LOGIC</text>
    <path d="M272 162h176M272 178h120" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- App out -->
  <g filter="url(#shadow)">
    <rect x="504" y="220" width="160" height="200" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="524" y="240" width="120" height="140" rx="16" fill="#0F172A" stroke="url(#g1)" stroke-width="2"/>
    <rect x="544" y="260" width="80" height="10" rx="5" fill="url(#g1)"/>
    <rect x="544" y="280" width="60" height="10" rx="5" fill="#475569"/>
    <rect x="544" y="308" width="80" height="48" rx="10" fill="#172554"/>
    <circle cx="584" cy="332" r="14" fill="url(#g1)" opacity=".5"/>
    <text x="544" y="210" fill="#94A3B8" font-family="Inter,sans-serif" font-size="13" font-weight="600">APP OUT</text>
  </g>

  <!-- Flow arrows -->
  <path d="M216 320h56" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M432 320h72" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
  <path d="M360 196v44" stroke="url(#light)" stroke-width="3" stroke-linecap="round"/>
  <path d="M360 392v44" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity=".5"/>

  <circle cx="248" cy="320" r="5" fill="#22D3EE"/>
  <circle cx="472" cy="320" r="5" fill="#6366F1"/>
  <circle cx="360" cy="240" r="5" fill="#FBBF24"/>
</svg>
